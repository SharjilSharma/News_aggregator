services:
  - type: web
    name: neuropulse
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false   # set this manually in the Render dashboard
      - key: YOUTUBE_API_KEY
        sync: false   # optional
    disk:
      name: neuropulse-data
      mountPath: /data
      sizeGB: 1
